<!DOCTYPE html>
<html>
    <head>
        <title>Bootstrap 5 Example</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <div class="container p-5 my-5 bg-info text-body">
        <h1>My First Bootstrap Page</h1>
        <p>Check this out!</p>
    </div>
    <div class="row">
    <div class="col-sm-4"><h1>Fish</h1></div>
    <div class="col-sm-4"><h1>With Sunglasses</h1></div>
    </div>
    <div>
        <img src="FISH.PNG" class="rounded-circle mx-auto d-block img-fluid" alt="Boss Fish">
    </div>
    <div class="alert alert-info">
        <strong>Fish!</strong>
    </div>
    <div class="row">
        <div class="col-sm-4"><button type="button" class="btn btn-outline-info btn-lg">Fish</button></div>
    </div>
</html>
